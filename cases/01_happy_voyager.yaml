id: happy_voyager
description: >
  Happy path - Voyager 1 heliopause crossing. Clean factual question
  with well-supported corpus pages. Agent should find the year (2012)
  and cite fetched URLs.
tags: [happy_path, space]
input: "What year did Voyager 1 cross the heliopause, and what was the evidence?"
expected_behavior:
  hard:
    - type: stopped_reason
      value: finish
    - type: tool_called
      tool: finish
    - type: tool_called
      tool: web_search
    - type: tool_called
      tool: fetch_url
    - type: citations_were_fetched
    - type: answer_contains
      substring: "2012"
    - type: tool_count_lte
      count: 8
    - type: search_before_fetch
  soft:
    - type: factual_correctness
      rubric_file: factual_correctness.md
      reference: >
        Voyager 1 crossed the heliopause in August 2012. NASA officially confirmed
        in September 2013 after analysis of plasma wave data. Evidence includes a
        drop in solar wind particles and a rise in galactic cosmic rays.
